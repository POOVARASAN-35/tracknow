version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: logistics-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - logistics-network

  redis:
    image: redis:alpine
    container_name: logistics-redis
    ports:
      - "6379:6379"
    networks:
      - logistics-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/logistics
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=your_jwt_access_secret_key_change_me_in_prod
      - JWT_REFRESH_SECRET=your_jwt_refresh_secret_key_change_me_in_prod
      - GOOGLE_MAPS_API_KEY=your_google_maps_api_key_placeholder
    depends_on:
      - mongodb
      - redis
    networks:
      - logistics-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logistics-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - logistics-network

networks:
  logistics-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
